name: Oppdater bedriftsdata

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: pip install requests

      - name: Hent data fra Enhetsregisteret
        run: |
          rm -f data/ENK.json data/SMB.json data/MID.json data/STOR.json
          python scripts/fetch_data.py

      - name: Commit og push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "auto: oppdater bedriftsdata $(date +'%Y-%m-%d')"
          git push
